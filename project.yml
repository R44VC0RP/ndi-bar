name: ndi-bar
options:
  bundleIdPrefix: com.ryanvogel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    # dev signing; flip to a Developer ID identity when you distribute
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ndi-bar:
    type: application
    platform: macOS
    sources:
      - path: ndi-bar
        excludes:
          - "**/.DS_Store"
    resources:
      - ndi-bar/Assets.xcassets
    entitlements:
      path: ndi-bar/ndi-bar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.network.server: true
        com.apple.security.network.client: true
    info:
      path: ndi-bar/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: ndi-bar
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHighResolutionCapable: true
        NSScreenCaptureUsageDescription: "ndi-bar needs screen recording permission to capture displays and broadcast them over NDI."
        NSHumanReadableCopyright: "ndi-bar is independent software. NDI® is a registered trademark of Vizrt NDI AB."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanvogel.ndi-bar
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
